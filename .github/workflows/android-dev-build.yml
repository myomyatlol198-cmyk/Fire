name: Generate Android Dev Build APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' 

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Prebuild Expo App
        run: npx expo prebuild --platform android

      - name: Build APK Locally
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --local \
            --platform android \
            --profile development \
            --non-interactive \
            --output=./development-build.apk

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: ./development-build.apk
          name: Development Build ${{ github.ref_name }}
          body: |
            Development APK generated automatically via local GitHub Actions compilation.
            
            **Tag:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: true